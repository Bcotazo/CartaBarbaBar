<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carta Barba Bar - Pirata</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=IM+Fell+English+SC&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Canvas para animación de rayos (requerido por script.js) -->
    <canvas id="lightning-bg"></canvas>

    <!-- Overlay de video de presentación -->
    <div id="video-intro">
        <video id="intro-video" autoplay muted playsinline preload="auto">
            <source src="videos/The_skull_laughs.mp4" type="video/mp4">
        </video>
        <button id="unmute-btn" title="Activar sonido">☠</button>
        <button id="skip-btn">Saltar ✕</button>
    </div>

    <div class="book-container">

        <!-- Escena del libro + tabs laterales -->
        <div class="book-scene">

            <div class="book" id="book">

                <!-- Página 1: PORTADA -->
                <div class="page page-cover page-cover-top" data-density="hard">
                    <div class="page-content front-content">
                        <img class="book-cover-bg" src="Imagenes/portada_fuego.png" alt="Portada Pirata">
                        <img class="logo-fondo-marca" style="opacity:0.4;" src="Imagenes/Logo.jpg" alt="Logo">
                        <div class="cover-info-overlay" style="top:auto;bottom:18%;justify-content:flex-end;">
                            <div class="location-info">
                                <p>Parque Obrero Itagüí</p>
                                <p>Carrera 51A # 47 - 21</p>
                                <p>Contacto: 3003580785</p>
                            </div>
                        </div>
                        <div class="fire-flames"></div>
                    </div>
                </div>

                <!-- Página 2: Historia -->
                <div class="page">
                    <div class="page-content">
                        <img src="Imagenes/NuestraHistoria_page_1.jpg" alt="Historia">
                    </div>
                </div>

                <!-- Página 3: Cócteles -->
                <div class="page">
                    <div class="page-content">
                        <img src="Imagenes/Cocteles_page_2.jpg" alt="Cócteles">
                    </div>
                </div>

                <!-- Página 4: Cervezas -->
                <div class="page">
                    <div class="page-content">
                        <img src="Imagenes/Cervezas_page_3.jpg" alt="Cervezas">
                    </div>
                </div>

                <!-- Página 5: Artesanales -->
                <div class="page">
                    <div class="page-content">
                        <img src="Imagenes/CervezasArtesanales_page_4.jpg" alt="Cervezas Artesanales">
                    </div>
                </div>

                <!-- Página 6: Área Cósmica -->
                <div class="page">
                    <div class="page-content">
                        <img src="Imagenes/AreaCosmica_page_5.jpg" alt="Área Cósmica">
                    </div>
                </div>

                <!-- Página 7: Jarras -->
                <div class="page">
                    <div class="page-content">
                        <img src="Imagenes/JarrasDeCerveza_page_6.jpg" alt="Jarras de Cerveza">
                    </div>
                </div>

                <!-- Página 8: Aguardiente -->
                <div class="page">
                    <div class="page-content">
                        <img src="Imagenes/Aguardiente_page_7.jpg" alt="Aguardiente">
                    </div>
                </div>

                <!-- Página 9: Whisky -->
                <div class="page">
                    <div class="page-content">
                        <img src="Imagenes/whisky_page_8.jpg" alt="Whisky">
                    </div>
                </div>

                <!-- Página 10: Brandy / Vodka / Tequila -->
                <div class="page">
                    <div class="page-content">
                        <img src="Imagenes/BrandyVodkaTequila_page_9.jpg" alt="Brandy, Vodka, Tequila">
                    </div>
                </div>

                <!-- Página 11: Ron -->
                <div class="page">
                    <div class="page-content">
                        <img src="Imagenes/Ron_page_10.jpg" alt="Ron">
                    </div>
                </div>

                <!-- Página 12: Shots -->
                <div class="page">
                    <div class="page-content">
                        <img src="Imagenes/Shots_page_11.jpg" alt="Shots">
                    </div>
                </div>

                <!-- Página 13: Bebidas -->
                <div class="page">
                    <div class="page-content">
                        <img src="Imagenes/Bebidas_page_12.jpg" alt="Bebidas">
                    </div>
                </div>

                <!-- Página 14: Varios -->
                <div class="page">
                    <div class="page-content">
                        <img src="Imagenes/Varios_page_13.jpg" alt="Varios">
                    </div>
                </div>

                <!-- Página 15: Nuestros Parches -->
                <div class="page">
                    <div class="page-content">
                        <img src="Imagenes/NuestrosParches_page_14.jpg" alt="Nuestros Parches">
                    </div>
                </div>

                <!-- Página 16: Redes Sociales -->
                <div class="page">
                    <div class="page-content parchment"
                        style="flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;">
                        <img src="Imagenes/Logo.jpg"
                            style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0.1;mix-blend-mode:multiply;pointer-events:none;z-index:0;"
                            alt="Fondo">
                        <div style="z-index:1;text-align:center;display:flex;flex-direction:column;align-items:center;">
                            <h2 class="pirate-title">¡Únete a la Tripulación!</h2>
                            <div style="font-family:'IM Fell English SC',serif;font-size:clamp(0.75rem,2.2vw,1.5rem);color:#3e2723;text-align:center;line-height:1.7;">
                                <p style="margin:12px 0;">
                                    <span style="font-size:clamp(1rem,3vw,1.8rem);">📷</span>
                                    <strong> Instagram:</strong><br>
                                    <strong style="color:#8b5a2b;font-size:clamp(0.7rem,2vw,1.2rem);">@barbabar</strong>
                                </p>
                                <p style="margin:12px 0;">
                                    <span style="font-size:clamp(1rem,3vw,1.8rem);">📘</span>
                                    <strong> Facebook:</strong><br>
                                    <strong style="color:#8b5a2b;font-size:clamp(0.7rem,2vw,1.2rem);">Barba Bar Oficial</strong>
                                </p>
                                <p style="margin:12px 0;">
                                    <span style="font-size:clamp(1rem,3vw,1.8rem);">🎵</span>
                                    <strong> TikTok:</strong><br>
                                    <strong style="color:#8b5a2b;font-size:clamp(0.7rem,2vw,1.2rem);">@barbabar</strong>
                                </p>
                            </div>
                            <img src="Imagenes/Logo.jpg"
                                style="width:clamp(60px,15vw,90px);height:clamp(60px,15vw,90px);border-radius:50%;outline:3px solid #4a3219;box-shadow:0 5px 15px rgba(0,0,0,0.5);margin-top:20px;"
                                alt="Logo Redes">
                        </div>
                        <div class="fire-flames"></div>
                    </div>
                </div>

                <!-- Página 17: Frase de cortesía -->
                <div class="page">
                    <div class="page-content parchment"
                        style="flex-direction:column;text-align:center;padding:40px;position:relative;overflow:hidden;">
                        <img src="Imagenes/Logo.jpg"
                            style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0.1;mix-blend-mode:multiply;pointer-events:none;z-index:0;"
                            alt="Fondo">
                        <div style="z-index:1;">
                            <div class="end-text">"Un buen ron lo cura todo,<br>y una buena compañía<br>lo mejora."</div>
                            <div style="margin:24px auto 0;width:60px;border-bottom:3px solid #8b5a2b;"></div>
                        </div>
                        <div class="fire-flames"></div>
                    </div>
                </div>

                <!-- Página 18: CONTRATAPA -->
                <div class="page page-cover page-cover-bottom" data-density="hard">
                    <div class="page-content front-content">
                        <img class="book-cover-bg" src="Imagenes/portada_fuego.png" alt="Contratapa">
                        <img class="logo-fondo-marca" style="opacity:0.4;" src="Imagenes/Logo.jpg" alt="Logo">
                        <div class="cover-info-overlay" style="top:auto;bottom:12%;justify-content:center;">
                            <div class="end-text"
                                style="color:#e5c158;text-shadow:2px 2px 10px rgba(0,0,0,1);font-size:clamp(1.2rem,3.5vw,2.2rem);text-align:center;">
                                Fin del Recorrido,<br>Marinero.
                            </div>
                        </div>
                        <div class="fire-flames"></div>
                    </div>
                </div>

            </div><!-- /book -->

            <!-- ── Sellos de Navegación Pirata ── -->
            <nav class="seal-nav" id="seal-nav">

                <button class="seal-arrow" id="seal-prev" aria-label="Categorías anteriores">
                    <svg viewBox="0 0 42 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <polygon points="1,10 14,4 14,16"/>
                        <rect x="13" y="1" width="4" height="18" rx="1"/>
                        <rect x="17" y="6" width="15" height="8" rx="3"/>
                        <ellipse cx="36" cy="10" rx="5" ry="5"/>
                    </svg>
                </button>

                <div class="seal-track-wrapper">
                    <div class="seal-track" id="seal-track">

                        <button class="seal-btn" data-page="1">
                            <span class="seal-icon">⚓</span>
                            <span class="seal-label">Historia</span>
                        </button>

                        <button class="seal-btn" data-page="2">
                            <span class="seal-icon">🍹</span>
                            <span class="seal-label">Cócteles</span>
                        </button>

                        <button class="seal-btn" data-page="3">
                            <span class="seal-icon">🍺</span>
                            <span class="seal-label">Cervezas</span>
                        </button>

                        <button class="seal-btn" data-page="7">
                            <span class="seal-icon">💀</span>
                            <span class="seal-label">Licores</span>
                        </button>

                        <button class="seal-btn" data-page="14">
                            <span class="seal-icon">☠</span>
                            <span class="seal-label">Parches</span>
                        </button>

                    </div>
                </div>

                <button class="seal-arrow" id="seal-next" aria-label="Siguientes categorías">
                    <svg viewBox="0 0 42 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <polygon points="41,10 28,4 28,16"/>
                        <rect x="25" y="1" width="4" height="18" rx="1"/>
                        <rect x="10" y="6" width="15" height="8" rx="3"/>
                        <ellipse cx="6" cy="10" rx="5" ry="5"/>
                    </svg>
                </button>

            </nav>

        </div><!-- /book-scene -->

        <!-- Controles de navegación -->
        <div class="controls">
            <button id="prev-btn" class="pirate-btn">◀ Anterior</button>
            <span id="page-counter" class="page-counter">1 / 18</span>
            <button id="next-btn" class="pirate-btn">Siguiente ▶</button>
        </div>

    </div><!-- /book-container -->

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <script src="script.js"></script>
    <script>
        (function () {
            const overlay  = document.getElementById('video-intro');
            const video    = document.getElementById('intro-video');
            const skipBtn  = document.getElementById('skip-btn');
            const unmuteBtn = document.getElementById('unmute-btn');

            function dismiss() {
                overlay.classList.add('hidden');
                setTimeout(() => overlay.remove(), 800);
            }

            unmuteBtn.addEventListener('click', () => {
                video.muted = !video.muted;
                unmuteBtn.textContent = video.muted ? '☠' : '♪';
            });

            video.addEventListener('ended', () => setTimeout(dismiss, 1500));
            skipBtn.addEventListener('click', dismiss);
        })();
    </script>
</body>

</html>
