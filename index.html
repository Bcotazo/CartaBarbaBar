    <script src="script.js"></script>
    <script>
        (function () {
            const overlay   = document.getElementById('video-intro');
            const video     = document.getElementById('intro-video');
            const skipBtn   = document.getElementById('skip-btn');
            const unmuteBtn = document.getElementById('unmute-btn');
            let   stallTimer = null;

            function dismiss() {
                if (stallTimer) clearTimeout(stallTimer);
                overlay.classList.add('hidden');
                setTimeout(() => overlay.remove(), 800);
            }

            function clearStall() {
                if (stallTimer) { clearTimeout(stallTimer); stallTimer = null; }
            }

            // Si el video se detiene esperando datos, dar 4 s antes de saltar
            video.addEventListener('waiting', () => {
                if (!stallTimer) stallTimer = setTimeout(dismiss, 4000);
            });
            video.addEventListener('playing', clearStall);
            video.addEventListener('canplay',  clearStall);

            unmuteBtn.addEventListener('click', () => {
                video.muted = !video.muted;
                unmuteBtn.textContent = video.muted ? '☠' : '♪';
            });

            video.addEventListener('ended', () => setTimeout(dismiss, 1500));
            skipBtn.addEventListener('click', dismiss);
        })();
    </script>
