<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta Barba Bar - Pirata</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=IM+Fell+English+SC&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="book-container">
        <!-- Título principal -->
        <!-- <h1 class="pirate-title">BIENVENIDOS A BARBA BAR</h1> -->
        <div class="book" id="book">
            <!-- Página 1: PORTADA -->
            <div class="page page-cover page-cover-top" data-density="hard">
                <div class="page-content front-content">
                    <img class="book-cover-bg" src="Imagenes/portada_fuego.png" alt="Libro Pirata Antiguo">
                    <img class="logo-fondo-marca" style="opacity: 0.4;" src="Imagenes/Logo.jpg" alt="Logo Barba Bar como fondo">
                    <div class="cover-info-overlay" style="top: auto; bottom: 18%; justify-content: flex-end;">
                        <div class="location-info">
                            <p>Parque Obrero Itagüí</p>
                            <p>Carrera 51A # 47 - 21</p>
                            <p>Contacto: 3003580785</p>
                        </div>
                    </div>
                    <div class="fire-flames"></div>
                </div>
            </div>

            <!-- Página 2 (Reverso de portada) -->
            <div class="page">
                <div class="page-content">
                    <img src="Imagenes/NuestraHistoria_page_1.jpg" alt="Historia">
                </div>
            </div>

            <!-- Página 3 -->
            <div class="page">
                <div class="page-content">
                    <img src="Imagenes/Cocteles_page_2.jpg" alt="Cócteles">
                </div>
            </div>

            <!-- Página 4 -->
            <div class="page">
                <div class="page-content">
                    <img src="Imagenes/Cervezas_page_3.jpg" alt="Cervezas">
                </div>
            </div>

            <!-- Página 5 -->
            <div class="page">
                <div class="page-content">
                    <img src="Imagenes/CervezasArtesanales_page_4.jpg" alt="Cervezas Artesanales">
                </div>
            </div>

            <!-- Página 6 -->
            <div class="page">
                <div class="page-content">
                    <img src="Imagenes/AreaCosmica_page_5.jpg" alt="Área Cósmica">
                </div>
            </div>

            <!-- Página 7 -->
            <div class="page">
                <div class="page-content">
                    <img src="Imagenes/JarrasDeCerveza_page_6.jpg" alt="Jarras de Cerveza">
                </div>
            </div>

            <!-- Página 8 -->
            <div class="page">
                <div class="page-content">
                    <img src="Imagenes/Aguardiente_page_7.jpg" alt="Aguardiente">
                </div>
            </div>

            <!-- Página 9 -->
            <div class="page">
                <div class="page-content">
                    <img src="Imagenes/whisky_page_8.jpg" alt="Whisky">
                </div>
            </div>

            <!-- Página 10 -->
            <div class="page">
                <div class="page-content">
                    <img src="Imagenes/BrandyVodkaTequila_page_9.jpg" alt="Brandy, Vodka, Tequila">
                </div>
            </div>

            <!-- Página 11 -->
            <div class="page">
                <div class="page-content">
                    <img src="Imagenes/Ron_page_10.jpg" alt="Ron">
                </div>
            </div>

            <!-- Página 12 -->
            <div class="page">
                <div class="page-content">
                    <img src="Imagenes/Shots_page_11.jpg" alt="Shots">
                </div>
            </div>

            <!-- Página 13 -->
            <div class="page">
                <div class="page-content">
                    <img src="Imagenes/Bebidas_page_12.jpg" alt="Bebidas">
                </div>
            </div>

            <!-- Página 14 -->
            <div class="page">
                <div class="page-content">
                    <img src="Imagenes/Varios_page_13.jpg" alt="Varios">
                </div>
            </div>

            <!-- Página 15 -->
            <div class="page">
                <div class="page-content">
                    <img src="Imagenes/NuestrosParches_page_14.jpg" alt="Nuestros Parches">
                </div>
            </div>

            <!-- Página 16: Redes Sociales -->
            <div class="page">
                <div class="page-content parchment" style="flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; overflow: hidden;">
                    <!-- Sello de agua sutil del Logo -->
                    <img src="Imagenes/Logo.jpg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.1; mix-blend-mode: multiply; pointer-events: none; z-index: 0;" alt="Fondo">
                    
                    <div style="z-index: 1; text-align: center; display: flex; flex-direction: column; align-items: center;">
                        <h2 class="pirate-title" style="font-size: 3rem; color: #4a3219; text-shadow: 1px 1px 0px rgba(255,255,255,0.4); margin-bottom: 20px;">¡Únete a la Tripulación!</h2>
                        
                        <div style="font-family: 'IM Fell English SC', serif; font-size: 1.5rem; color: #3e2723; text-align: center; line-height: 1.6;">
                            <p style="margin: 15px 0;"><span style="font-size: 1.8rem;">📷</span> <strong>Instagram:</strong><br><strong style="color: #8b5a2b; font-size: 1.2rem;">@barbabar</strong></p>
                            <p style="margin: 15px 0;"><span style="font-size: 1.8rem;">📘</span> <strong>Facebook:</strong><br><strong style="color: #8b5a2b; font-size: 1.2rem;">Barba Bar Oficial</strong></p>
                            <p style="margin: 15px 0;"><span style="font-size: 1.8rem;">🎵</span> <strong>TikTok:</strong><br><strong style="color: #8b5a2b; font-size: 1.2rem;">@barbabar</strong></p>
                        </div>

                        <img src="Imagenes/Logo.jpg" style="width: 90px !important; height: 90px !important; border-radius: 50%; outline: 3px solid #4a3219; box-shadow: 0 5px 15px rgba(0,0,0,0.5); margin-top: 30px;" alt="Logo Redes">
                    </div>

                    <!-- Llama de Fuego base inferior interactiva -->
                    <div class="fire-flames"></div>
                </div>
            </div>

            <!-- Página 17: Frase en Blanco de cortesía -->
            <div class="page">
                <div class="page-content parchment" style="flex-direction: column; text-align: center; padding: 40px; opacity: 0.85; position: relative; overflow: hidden;">
                    <!-- Sello de agua sutil del Logo -->
                    <img src="Imagenes/Logo.jpg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.1; mix-blend-mode: multiply; pointer-events: none; z-index: 0;" alt="Fondo">
                    
                    <div style="z-index: 1;">
                        <div class="end-text" style="font-size: 2.2rem; line-height: 1.4; color: #4a3219;">"Un buen ron lo cura todo,<br>y una buena compañía<br>lo mejora."</div>
                        <div style="margin: 30px auto 0; width: 60px; border-bottom: 3px solid #8b5a2b;"></div>
                    </div>

                    <!-- Llama de Fuego base inferior interactiva -->
                    <div class="fire-flames"></div>
                </div>
            </div>

            <!-- Página 18: CONTRATAPA -->
            <div class="page page-cover page-cover-bottom" data-density="hard">
                <div class="page-content front-content">
                    <img class="book-cover-bg" src="Imagenes/portada_fuego.png" alt="Libro Pirata Antiguo">
                    <img class="logo-fondo-marca" style="opacity: 0.4;" src="Imagenes/Logo.jpg" alt="Logo Barba Bar como fondo">
                    <div class="cover-info-overlay" style="top: auto; bottom: 12%; justify-content: center;">
                        <div class="end-text" style="color: #e5c158; text-shadow: 2px 2px 10px rgba(0,0,0,1); font-size: 2.2rem; text-align: center;">
                            Fin del Recorrido,<br>Marinero.
                        </div>
                    </div>
                    <div class="fire-flames"></div>
                </div>
            </div>
        </div>      </div>

        <!-- Controles para móvil o para accesibilidad -->
        <div class="controls">
            <button id="prev-btn" class="pirate-btn">⬅ Anterior</button>
            <button id="next-btn" class="pirate-btn">Siguiente ➡</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <script src="script.js"></script>
</body>

</html>
